<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Azure231 — CV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #fef5d8; color: #3a2417; font-family: 'Pixelify Sans', ui-monospace, monospace; min-height: 100vh; }
    * { box-sizing: border-box; }
    a { color: inherit; }
    .bar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 14px 24px; background: #3a2417; color: #ffd24a;
      border-bottom: 4px solid #e85a3c;
      flex-wrap: wrap;
    }
    .bar .title { font-family: 'Press Start 2P', monospace; font-size: 16px; letter-spacing: 0.05em; }
    .bar .links { display: flex; gap: 10px; flex-wrap: wrap; }
    .bar a {
      font-family: 'Pixelify Sans', monospace; font-weight: 700; font-size: 16px;
      text-decoration: none; padding: 8px 14px;
      background: #ffd24a; color: #3a2417;
      border: 3px solid #fef5d8;
      box-shadow: 3px 3px 0 #fef5d8;
    }
    .bar a.ghost { background: transparent; color: #ffd24a; border-color: #ffd24a; box-shadow: 3px 3px 0 #e85a3c; }
    .viewer {
      width: 100%; height: calc(100vh - 64px);
      background: #fce4a8;
    }
    .viewer object, .viewer iframe {
      width: 100%; height: 100%; border: 0; display: block;
    }
    .fallback {
      padding: 40px 24px; text-align: center; font-size: 20px;
    }
    .fallback a {
      display: inline-block; margin-top: 16px;
      background: #e85a3c; color: #fff; padding: 12px 22px;
      border: 3px solid #3a2417; box-shadow: 5px 5px 0 #3a2417;
      font-weight: 700; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="title">✿ azure231 · cv</div>
    <div class="links">
      <a href="../">← back to portfolio</a>
      <a class="ghost" href="../assets/azure231-cv.pdf" download>↓ download pdf</a>
    </div>
  </div>
  <div class="viewer">
    <object data="../assets/azure231-cv.pdf#view=FitH" type="application/pdf">
      <iframe src="../assets/azure231-cv.pdf#view=FitH" title="Azure231 CV">
        <div class="fallback">
          your browser can&apos;t display the pdf inline.
          <br />
          <a href="../assets/azure231-cv.pdf" download>download the pdf instead →</a>
        </div>
      </iframe>
    </object>
  </div>
</body>
</html>
